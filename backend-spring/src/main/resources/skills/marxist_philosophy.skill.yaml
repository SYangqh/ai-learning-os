# ─────────────────────────────────────────────────────────────────────────────
# Skill: 马克思主义哲学
# 适合人群：需要考研政治、公务员、或对辩证唯物主义感兴趣的学习者
# 最终产物：能用自己的话论述核心哲学原理并举例应用
# ─────────────────────────────────────────────────────────────────────────────

id: marxist_philosophy
display_name: 马克思主义哲学
target_audience: [frontend, hardware, finance, product, other]
project_blueprint: |
  核心原理体系：
  - 唯物论：物质与意识的关系
  - 辩证法：矛盾的普遍性与特殊性
  - 认识论：实践与认识的关系

stages:
  # ── Stage 1: 物质与意识 ───────────────────────────────────────────────────
  - index: 1
    goal: 理解物质与意识的辩证关系，能用自己的话论述
    nodes: [INTRO, CONCEPT, PRACTICE, TASK, REVIEW, RETRO]
    artifact_type: NOTE
    task_description: |
      用 300~400 字，以 Markdown 格式写一篇小论述，回答以下问题：

      **"物质与意识是什么关系？请结合一个现实生活中的例子加以说明。"**

      论述结构建议：
      1. 第一段：定义物质（客观实在性）与意识（主观能动性）
      2. 第二段：阐明物质决定意识、意识反作用于物质的辩证关系
      3. 第三段：举一个具体例子（工程/经济/日常生活均可）说明这一关系
    rubric:
      pass_criteria:
        - 包含"客观实在性"或物质的客观性描述
        - 明确表达"物质决定意识"
        - 明确表达"意识具有主观能动性"
        - 举出至少一个具体例子
        - 字数不少于 200 字
      fail_hints:
        - 不要把"物质"等同于"物质财富"，注意哲学意义的区分
        - 例子需要分析出"主观能动性"的具体体现，不能只是描述事件
        - 检查是否区分了"反映"（正确的意识）和"歪曲反映"（错误的意识）

  # ── Stage 2: 矛盾的普遍性与特殊性 ────────────────────────────────────────
  - index: 2
    goal: 掌握矛盾分析法，能用"两点论"和"重点论"分析问题
    nodes: [INTRO, CONCEPT, PRACTICE, TASK, REVIEW, RETRO]
    artifact_type: NOTE
    task_description: |
      用 300~400 字，以 Markdown 格式分析以下情境：

      **"一个软件项目既有技术难度大的挑战，也有团队协作不畅的问题。
      请用矛盾的普遍性与特殊性原理，分析应如何处理这两个矛盾？"**

      要求：
      1. 指出主要矛盾与次要矛盾
      2. 运用"重点论"说明优先解决哪个
      3. 运用"两点论"说明不能忽视另一个
    rubric:
      pass_criteria:
        - 正确区分了主要矛盾与次要矛盾
        - 使用了"两点论"和"重点论"概念
        - 结论有具体的行动指导（不只是定义罗列）
      fail_hints:
        - 避免只背定义，要结合情境分析
        - "主要矛盾"是指对全局起决定性作用的矛盾，需要说明判断依据
        - 两点论不等于平均主义，要体现侧重

# ─────────────────────────────────────────────────────────────────────────────
# 背景感知类比词典
# ─────────────────────────────────────────────────────────────────────────────

analogy_map:
  frontend:
    dialectic: "类比 React 状态管理：物质（外部数据）决定组件状态（意识），组件反过来通过事件改变数据"
    contradiction: "类比 bug 与功能需求的矛盾：主要矛盾是最影响用户体验的 bug，需优先修复"
  hardware:
    dialectic: "类比传感器采样：物质是模拟信号（客观存在），意识是数字化后的数据（主观处理）"
    contradiction: "类比硬件设计中的性能与功耗矛盾：主要矛盾由产品定位决定（低功耗优先或高性能优先）"
  finance:
    dialectic: "类比市场与预期：客观市场是物质基础，投资预期是意识，预期反作用于市场（羊群效应）"
    contradiction: "类比短期利润与长期价值的矛盾：主要矛盾取决于投资周期"
  product:
    dialectic: "类比用户行为与产品设计：用户的实际使用行为是物质基础，产品设计理念是意识，好设计源于真实行为"
    contradiction: "类比功能数量与产品简洁性的矛盾：主要矛盾是用户最高频的核心需求"
