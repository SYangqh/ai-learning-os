# ─────────────────────────────────────────────────────────────────────────────
# Skill: 后端基础
# 适合人群：有前端/硬件/金融背景，想从零掌握后端开发
# 最终产物：一个带 CRUD + JWT 鉴权 + 部署的博客 API
# ─────────────────────────────────────────────────────────────────────────────

id: backend_basics
display_name: 后端基础
target_audience: [frontend, hardware, finance, product, other]
project_blueprint: |
  做一个博客 API：
  - CRUD 文章接口（GET/POST/PUT/DELETE）
  - JWT 用户鉴权
  - PostgreSQL 持久化
  - Docker 部署

stages:
  # ── Stage 1: HTTP 与 RESTful ────────────────────────────────────────────────
  - index: 1
    goal: 理解 HTTP 协议与 RESTful 设计原则
    nodes: [INTRO, CONCEPT, PRACTICE, TASK, REVIEW, RETRO]
    task_description: |
      用 Spring Boot 实现 GET /articles 接口，返回文章列表（固定假数据即可）。
      要求：状态码正确，响应体为 JSON 数组，每条包含 id、title、createdAt。
    artifact_type: CODE
    rubric:
      pass_criteria:
        - 接口路径为 GET /articles
        - 响应 Content-Type 为 application/json
        - 返回 HTTP 200 状态码
        - 响应体为数组，每项包含 id、title 字段
      fail_hints:
        - 检查是否添加了 @RestController 和 @GetMapping
        - 检查返回类型是否为 List 而不是单个对象
        - 确认没有遗漏 @RequestMapping("/articles") 或路径写错

  # ── Stage 2: 数据库与 JPA ───────────────────────────────────────────────────
  - index: 2
    goal: 用 JPA + PostgreSQL 持久化数据，替换假数据
    nodes: [INTRO, CONCEPT, PRACTICE, TASK, REVIEW, RETRO]
    task_description: |
      为 Article 创建 JPA Entity 和 Repository，
      实现 POST /articles（创建）和 GET /articles/{id}（查询单篇）。
      数据必须真正写入 PostgreSQL，重启后数据不丢失。
    artifact_type: CODE
    rubric:
      pass_criteria:
        - Article 有 @Entity 注解
        - 有 ArticleRepository extends JpaRepository
        - POST /articles 返回 201 状态码
        - 数据写入 DB 后可通过 GET 查询到
      fail_hints:
        - 检查 @Entity 类是否有无参构造函数（或用 Lombok @NoArgsConstructor）
        - 检查 application.yml 中 datasource 配置是否正确
        - 确认 POST 返回的是 ResponseEntity.status(201).body(...)

  # ── Stage 3: JWT 鉴权 ────────────────────────────────────────────────────────
  - index: 3
    goal: 为 API 加上 JWT 鉴权，区分公开接口与受保护接口
    nodes: [INTRO, CONCEPT, PRACTICE, TASK, REVIEW, RETRO]
    task_description: |
      实现 POST /auth/register 和 POST /auth/login，登录后返回 JWT。
      让 POST/PUT/DELETE /articles 必须携带有效 JWT 才能访问，
      GET /articles 保持公开可访问。
    artifact_type: CODE
    rubric:
      pass_criteria:
        - POST /auth/login 成功时返回 access_token
        - 不带 token 访问 POST /articles 返回 401
        - 带有效 token 访问 POST /articles 返回 200/201
        - GET /articles 不带 token 也能访问
      fail_hints:
        - 检查 SecurityConfig 中 permitAll() 是否包含了 GET /articles
        - 检查 JwtFilter 是否正确从 Authorization: Bearer 头部提取 token
        - 确认 token 过期时间设置合理（不要设成 0）

  # ── Stage 4: 完整 CRUD + 部署 ────────────────────────────────────────────────
  - index: 4
    goal: 补全 PUT/DELETE 接口，并用 Docker 打包部署
    nodes: [INTRO, CONCEPT, PRACTICE, TASK, REVIEW, RETRO]
    task_description: |
      补全 PUT /articles/{id} 和 DELETE /articles/{id}，
      只有文章作者才能修改/删除自己的文章（403 否则）。
      写一个 Dockerfile，能通过 docker build + docker run 启动整个服务。
    artifact_type: CODE
    rubric:
      pass_criteria:
        - PUT /articles/{id} 用非作者 token 访问返回 403
        - DELETE /articles/{id} 成功后返回 204
        - Dockerfile 存在且能成功 build
        - docker run 后服务在 8080 端口响应
      fail_hints:
        - 检查删除前是否验证了当前用户是文章作者
        - Dockerfile 中确认 EXPOSE 8080 并用 java -jar 启动
        - 确认 docker build 时所有依赖已经打进 jar（mvn package -DskipTests）

# ─────────────────────────────────────────────────────────────────────────────
# 背景感知类比词典
# ─────────────────────────────────────────────────────────────────────────────

analogy_map:
  frontend:
    http_request: "类比 fetch()：你发一个请求，服务器回一个 Response，状态码就是 .status"
    rest_api: "类比你调用的第三方 API：有统一的 URL 规范，用 HTTP 动词区分操作"
    database: "类比 localStorage，只不过数据存在服务器上，多用户共享，重启不丢失"
    jwt: "类比 localStorage 里存的 token，每次请求带上，服务器验签而不是查 session"
    jpa_entity: "类比 TypeScript interface，只不过加了注解后框架自动帮你建表和写 SQL"
    docker: "类比 npm run build 打包，Dockerfile 就是 package.json，镜像就是 node_modules 全装好的快照"

  hardware:
    http_request: "类比总线请求：主控（客户端）发出请求信号，外设（服务器）响应并返回数据"
    rest_api: "类比寄存器映射：每个地址（URL）对应特定资源，读写用不同指令（GET/POST）"
    database: "类比 Flash 存储：掉电不丢失，随机访问，有地址寻址（主键）"
    jwt: "类比握手协议里的 Session Key：首次认证后双方持有，后续通信用它验证身份"
    jpa_entity: "类比结构体定义：描述数据布局，框架负责序列化/反序列化到存储介质"
    docker: "类比固件镜像：把运行环境和程序打包成一个可重复烧录的快照"

  finance:
    http_request: "类比交易指令：客户端发出委托（请求），交易所回执确认（响应）"
    rest_api: "类比接口规范书：统一的报文格式、字段定义和操作码（HTTP 动词）"
    database: "类比交易台账：持久化记录，支持查询、回溯、审计"
    jwt: "类比数字签名：用私钥签名，对方用公钥验签，无需联网核查身份"
    jpa_entity: "类比报文结构定义：字段、类型、主键，框架负责映射到存储层"
    docker: "类比沙盒环境：把运行时完整封装，保证在任何服务器上行为一致"

  product:
    http_request: "类比表单提交：用户填数据点发送，服务器处理后返回结果页"
    rest_api: "类比产品需求文档：规定了每个功能的入口、参数和预期输出"
    database: "类比 Excel 表格：持久化存用户数据，多人可同时读写"
    jwt: "类比登录态 Cookie：记住你是谁，不用每次都重新登录"
    jpa_entity: "类比数据库建表设计：定义每条记录有哪些字段"
    docker: "类比应用商店里的 App 包：一次打包，到处运行"

# ─────────────────────────────────────────────────────────────────────────────
# 常见陷阱与反模式（Vibe Coding 过程中真实遇到的问题，供 AI 导师主动预警）
# ─────────────────────────────────────────────────────────────────────────────

pitfalls:

  # ── 1. @Transactional + 外部 HTTP 调用（最高频问题）─────────────────────────
  - id: transactional_with_http
    title: "@Transactional 包裹了外部 HTTP 调用（LLM / 第三方 API）"
    symptom: |
      运行时抛出：
        UnexpectedRollbackException: Transaction silently rolled back
          because it has been marked as rollback-only
      通常出现在调用 AI / 邮件 / 支付等外部 HTTP 接口之后。
    root_cause: |
      Spring 的 @Transactional 事务在方法执行期间保持数据库连接。
      一旦外部 HTTP 调用抛出任何异常（网络超时、API Key 错误等），
      Spring 立刻将当前事务标记为 rollback-only。
      即使你 catch 了异常继续执行，最终提交时也会抛 UnexpectedRollbackException。
    fix: |
      将方法拆成三段，外部 HTTP 调用在事务外执行：

        // ❌ 错误写法
        @Transactional
        public Result doWork(UUID userId) {
            String reply = llmService.chat(userId, messages);  // HTTP 调用！
            saveReply(reply);                                   // DB 操作
            return ...;
        }

        // ✅ 正确写法
        public Result doWork(UUID userId) {             // 不加 @Transactional
            Ctx ctx = prepareWork(userId);              // @Transactional：读 DB、写前置消息
            String reply = llmService.chat(userId, ctx.messages());  // 事务外 HTTP
            return persistResult(userId, reply);        // @Transactional：写回复、更新状态
        }

        @Transactional protected Ctx prepareWork(...) { ... }
        @Transactional protected Result persistResult(...) { ... }
    affected_files:
      - PathService.generatePath / savePath
      - PathService.startStage / saveNewSession
      - SessionService.advance / prepareAdvance / persistReply
      - SessionService.freeChat / prepareFreeChat / saveChatReply
    prevention: |
      凡是方法内包含 chatService.chat() / mailService.send() / 任何 RestClient 调用，
      一律不加 @Transactional。在代码 review 阶段用关键字 "chat\|RestClient\|send" 检索
      被 @Transactional 包裹的方法。

  # ── 2. JPA save() 后字段未回填（id / createdAt 为 null）───────────────────
  - id: jpa_save_no_flush
    title: "JPA save() 后立即使用 id / createdAt，但字段为 null"
    symptom: |
      NullPointerException at Map.of(...)
      通常发生在把刚 save() 的实体传给序列化逻辑（Controller toMap）时。
    root_cause: |
      JPA save() 只是将实体加入一级缓存（pending INSERT）。
      数据库生成的字段（@GeneratedValue 的 id、@CreationTimestamp 的 createdAt）
      在事务提交或显式 flush 之前不会被回填到 Java 对象。
      Map.of() 禁止 null 值，触发 NPE。
    fix: |
      将 save() 改为 saveAndFlush()，立即执行 INSERT 并让 DB 回填字段：

        // ❌ 错误
        messageRepository.save(msg);
        return Map.of("id", msg.getId(), ...);   // getId() 可能为 null！

        // ✅ 正确
        msg = messageRepository.saveAndFlush(msg);
        return Map.of("id", msg.getId(), ...);   // 已由 DB 回填
    affected_files:
      - PathService.saveNewSession（SessionMessage 的 openingMsg）
    prevention: |
      凡是 save() 之后**立即**在同一方法内读取该实体的 DB 生成字段，改用 saveAndFlush()。
      只在需要批量插入性能优化时才使用 save()，且不能紧接着读取回填字段。

  # ── 3. 唯一索引 + JPA flush 顺序导致的 duplicate key ────────────────────────
  - id: unique_index_flush_order
    title: "带 WHERE 条件的唯一部分索引 + JPA find-set-save 导致 duplicate key"
    symptom: |
      PSQLException: ERROR: duplicate key value violates unique constraint
      通常出现在"先标记旧记录为 revoked，再插入新记录"的 upsert 逻辑中。
    root_cause: |
      JPA 一级缓存的 flush 顺序：INSERT 先于 UPDATE。
      当你先 save(newEntity)（pending INSERT），再 save(oldEntity with revokedAt)
      （pending UPDATE），JPA 实际执行顺序是 INSERT → UPDATE。
      部分唯一索引（WHERE revoked_at IS NULL）在 INSERT 时仍看到旧记录未 revoke，
      触发 duplicate key。
    fix: |
      用 @Modifying JPQL UPDATE 代替 JPA 实体 save()，直接写 SQL，立即执行：

        // ❌ 错误（依赖 JPA flush 顺序）
        old.setRevokedAt(now);
        repo.save(old);          // pending UPDATE（实际晚于 INSERT 执行）
        repo.save(newEntity);    // pending INSERT

        // ✅ 正确（JPQL UPDATE 立即执行，先于后续 INSERT）
        @Modifying
        @Query("UPDATE Credential c SET c.revokedAt = :now WHERE c.userId = :uid AND c.provider = :p AND c.revokedAt IS NULL")
        void revokeActive(@Param("uid") UUID uid, @Param("p") String p, @Param("now") OffsetDateTime now);
    affected_files:
      - UserLlmCredentialRepository.revokeByUserAndProvider
      - LlmCredentialService.upsert
    prevention: |
      凡是 upsert / soft-delete + insert 场景，优先用 @Modifying @Query 而不是 JPA save()。

  # ── 4. enc_tag null 约束：加密字段拆分后实体/EncryptedPayload 未同步 ─────────
  - id: enc_tag_null_constraint
    title: "DB 的 enc_tag NOT NULL 字段，但 JPA 实体和 EncryptedPayload 未同步添加"
    symptom: |
      PSQLException: ERROR: null value in column "enc_tag" of relation "user_llm_credentials"
        violates not-null constraint
    root_cause: |
      AES-256-GCM 加密后，tag（认证标签，16 字节）被分开存为独立列，以便校验完整性。
      DB 迁移添加了 enc_tag NOT NULL 列，但 Java 侧的 EncryptedPayload record
      和 UserLlmCredential 实体没有添加对应字段，导致插入时 tag 为 null。
    fix: |
      三处同步更新：
      1. EncryptedPayload record 增加 tag 字段
      2. CryptoService.encrypt() 从密文尾部提取 16 字节 tag，存入 payload.tag()
      3. UserLlmCredential 实体增加 @Column(name="enc_tag") private String encTag
      4. LlmCredentialService.upsert() 调用 cred.setEncTag(payload.tag())
    affected_files:
      - EncryptedPayload.java
      - CryptoService.java
      - UserLlmCredential.java
      - LlmCredentialService.java

  # ── 5. ApiTest 未 mock LLM，无法覆盖含 AI 调用的接口链路 ────────────────────
  - id: apitest_missing_llm_mock
    title: "ApiTest 没有 @MockBean DynamicChatService，含 LLM 的接口无法被测试覆盖"
    symptom: |
      生产环境出现 NPE / UnexpectedRollbackException，但 ApiTest 全部通过。
      原因是测试中相关接口根本没有执行到 LLM 调用后的代码路径。
    root_cause: |
      DynamicChatService 在没有真实 API Key 的测试环境中会直接抛异常，
      导致 startStage / advance / generatePath 等接口无法走完整链路，
      序列化、DB flush、节点推进逻辑的 bug 不会被测试发现。
    fix: |
      在 ApiTest 中声明：
        @MockBean DynamicChatService chatService;

      在调用含 LLM 的接口前 stub：
        Mockito.when(chatService.chat(any(), any(), any()))
               .thenReturn("固定的回复文本");

      然后补充 generatePath 和 startStage 的完整链路测试用例。
    affected_files:
      - ApiTest.java
    prevention: |
      每新增一个调用外部服务的接口，ApiTest 必须同时：
      1. 在类级别 @MockBean 对应的外部服务 Bean
      2. 补充至少一个完整链路的测试用例（stub → HTTP → 断言响应结构）

  # ── 6. Windows 控制台中文日志乱码 ──────────────────────────────────────────
  - id: windows_log_encoding
    title: "Windows 控制台运行 Spring Boot，中文日志输出乱码"
    symptom: |
      日志中中文显示为乱码（如 鏈嶅姟 → 服务），Linux/Mac 下正常。
    root_cause: |
      Windows 控制台默认使用 GBK 编码（代码页 936），而 JVM 和 Logback 默认输出 UTF-8。
      两者不匹配导致多字节汉字被错误解码。
    fix: |
      推荐方案：新增 src/main/resources/logback-spring.xml，在 ConsoleAppender 中声明 charset：

        <appender name="CONSOLE" class="ch.qos.logback.core.ConsoleAppender">
          <encoder>
            <charset>UTF-8</charset>
            <pattern>%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5level %22logger{22} : %msg%n</pattern>
          </encoder>
        </appender>

      备选方案（application.yml）：
        logging:
          charset:
            console: UTF-8
    prevention: |
      项目初建时就创建 logback-spring.xml 并声明 UTF-8，避免后期排查日志问题时的干扰。
      logback-spring.xml 比 application.yml 的 logging.charset 更可靠（Logback 原生配置）。

  # ── 7. @Modifying 缺少 @Transactional 导致 InvalidDataAccessApiUsageException ─
  - id: modifying_missing_transactional
    title: "@Modifying JPQL 未在 Repository 方法上声明 @Transactional"
    symptom: |
      运行时抛出：
        InvalidDataAccessApiUsageException: Executing an update/delete query
      通常出现在 @Modifying + @Query 的 UPDATE/DELETE 接口首次被调用时。
    root_cause: |
      Spring Data JPA 要求 @Modifying 方法必须在活跃事务中执行。
      即使调用方已有 @Transactional，Repository 方法本身也必须显式声明，
      否则 Spring Data JPA 的代理层会拒绝执行并抛出此异常。
    fix: |
      在 Repository 的 @Modifying 方法上同时加 @Transactional：

        // ❌ 错误
        @Modifying
        @Query("UPDATE Artifact a SET a.status = :status WHERE ...")
        void updateStatus(...);

        // ✅ 正确
        @Modifying
        @Transactional
        @Query("UPDATE Artifact a SET a.status = :status WHERE ...")
        void updateStatus(...);
    affected_files:
      - ArtifactRepository.updateStatusBySession
      - UserLlmCredentialRepository.revokeByUserAndProvider（同样适用）
    prevention: |
      凡是 Repository 中出现 @Modifying，必须同时添加 @Transactional，这是固定搭配。

  # ── 8. 前后端枚举值不同步（Stage status / 任意状态字段）──────────────────────
  - id: enum_value_frontend_backend_mismatch
    title: "后端 DB/实体的状态枚举值与前端硬编码字符串不一致"
    symptom: |
      后端已将 Stage.status 更新为 "completed"，但前端侧边栏判断写的是 "done"，
      导致已完成阶段渲染为灰色不可点（locked 样式），用户无法查看历史记录。
    root_cause: |
      状态枚举值（如 locked/active/completed）只在后端 Java 实体 / DB CHECK 约束中定义，
      前端通过字符串字面量比较，两端没有共享类型源，极易在迭代中出现拼写差异。
    fix: |
      前端改为使用与后端一致的枚举字符串：
        // ❌ 错误
        stage.status === 'done'
        // ✅ 正确（与 Stage.java status 字段一致）
        stage.status === 'completed'
    prevention: |
      1. ARCHITECTURE.md 必须明确列出每个状态字段的完整枚举值
      2. 后端实体新增/修改状态字段时，同步检查前端所有引用该字段的 .tsx 文件
      3. 建议在 frontend/lib/api.ts 中定义对应的 TypeScript union type，避免字面量拼写错误
    affected_files:
      - Stage.java（后端枚举定义）
      - learn/page.tsx（前端消费处）

  # ── 9. 前端展示 "Internal Server Error" 等技术错误字符串，用户无法理解 ──────
  - id: raw_error_message_shown_to_user
    title: "前端 catch 到异常后直接展示技术性错误消息（Internal Server Error 等），用户看不懂"
    symptom: |
      页面 error 区域展示 "Internal Server Error" 或 HTTP 错误原文，
      用户不知道自己该做什么，无法自救。
    root_cause: |
      两层问题同时存在：
      1. 后端 GlobalExceptionHandler 对未捕获异常返回 500，body message 是通用文案；
         Spring Boot 默认错误体还有一个 "error" 字段值就是 "Internal Server Error"。
      2. 前端 apiFetch 用 ?? 提取 message：json?.message ?? json?.msg ?? text。
         ?? 只跳过 null/undefined，不跳过空字符串；如果 message 是 "" 则 fallback 失败，
         最终 throw 出来的是原始 JSON 字符串，catch 后直接 setError 展示给用户。
    fix: |
      前端 apiFetch 改用 || 代替 ??（让空字符串也触发 fallback）：
        // 错误
        message = json?.message ?? json?.msg ?? text
        // 正确
        message = json?.message || json?.error || json?.msg || text

      后端 Service 类方法不能把内部技术异常消息直接拼接到用户提示里：
        // 错误
        throw AppException.badRequest("验证失败：" + e.getMessage())
        // 正确（内部日志记原始原因，对外给固定可读文案）
        log.warn("failed for {}: {}", ctx, e.getMessage())
        throw AppException.badRequest("验证失败，请确认配置正确")
    prevention: |
      禁止在任何场景向用户展示 "Internal Server Error"、"null"、原始 HTTP 状态码文本。
      前端 catch 块：优先取后端 message 字段（用 ||）；取不到时展示预设业务友好文案，而不是 e.message 原文。
      后端 Service 层对外抛出 AppException 时 message 必须是用户可直接阅读的中文，不得拼接内部异常 message。
    affected_files:
      - frontend/src/lib/api.ts（apiFetch 错误提取逻辑）
      - DynamicChatService.testConnection（对外 AppException 消息）

  # ── 10. AI 控制节点推进：[ADVANCE] 标记未正确配置导致节点无法推进或无条件推进 ──
  - id: advance_marker_misconfigured
    title: "concept/practice/retro 节点每次 AI 回复后无条件推进，或永远不推进"
    symptom: |
      学员在 concept 节点说"不知道"，AI 讲解后系统自动跳到 practice；
      或者学员已明确掌握，但节点一直停留不前进。
    root_cause: |
      节点推进逻辑有两类极端：
      1. 服务端无条件推进（每次 AI 回复后就 nextNode()）：学员未理解也被强推，到 task 时没有能力完成
      2. AI System Prompt 中没有 [ADVANCE] 指令：AI 永远不加标记，节点永远卡住
      两者都破坏"必须学会才能过"的核心价值。
    fix: |
      三处必须同步配置：

      1. 服务端标记 AI 受控节点集合：
           private static final Set<String> AI_ADVANCE_CONTROLLED_NODES = Set.of("concept", "practice", "retro");

      2. persistReply() 检测标记，AI 受控节点未包含 [ADVANCE] 时停留：
           boolean aiRequestedAdvance = reply.contains("[ADVANCE]");
           if (AI_ADVANCE_CONTROLLED_NODES.contains(currentNode) && !aiRequestedAdvance) {
               return earlyReturn(strippedReply, currentNode);
           }

      3. System Prompt 中明确告知 AI 各节点的推进规则：
           concept  → 学员展示基本理解后在回复末尾加 [ADVANCE]，否则继续讲解
           practice → 学员回答正确后加 [ADVANCE]，答错继续引导
           retro    → 总结完成后加 [ADVANCE]
           intro    → 每次回复都加 [ADVANCE]（一轮即过）

      4. 返回给前端前剥离标记，不展示给用户：
           reply = reply.replace("[ADVANCE]", "").replaceAll("\\n{3,}", "\n\n").trim();
    affected_files:
      - SessionService.persistReply（标记检测 + 节点推进逻辑）
      - SessionService.buildSystemPrompt（各节点 Prompt 指令）
    prevention: |
      任何新增节点类型，必须在设计阶段明确"推进由谁控制"：
      - 服务端逻辑控制（artifact 提交门控 / REVIEW 关键词）→ 加入对应门控集合
      - AI 教学判断控制（是否真正理解）→ 加入 AI_ADVANCE_CONTROLLED_NODES + Prompt 指令
      - 一轮即推进（引导性开场）→ intro 节点默认行为
      NodeFsmTest 必须覆盖新节点的推进规则。

  # ── 11. API Key 直接保存而不验证，provider 选错时静默失败 ──────────────────
  - id: api_key_stored_without_validation
    title: "API Key 保存时未做连通性测试，provider 选错导致后续所有 LLM 调用失败"
    symptom: |
      用户选择了 OpenAI 但填入了 DeepSeek 的 key，保存成功；
      进入学习后所有 AI 回复报错："AI 服务暂时不可用"，用户不知道是 key 填错了。
    root_cause: |
      PUT /credentials 接口只做加密存储，不验证 key 是否真正有效。
      provider 选错（key 和 provider 不匹配）在存储阶段不会报错，但调用时会因为
      URL 不匹配（如 DeepSeek key 发到 api.openai.com）而失败。
    fix: |
      在保存凭据前，先调用连通性测试接口：

        // 后端：新增 testConnection 方法（不存 DB，只测试）
        public void testConnection(String providerKey, String apiKey) {
            LlmProvider provider = providerRepository.findByKey(providerKey)...;
            // 发送一条极简测试消息，失败则抛 AppException.badRequest(用户友好提示)
            callProvider(apiKey, provider, List.of(Map.of("role","user","content","Hi")));
        }

        // 新增 POST /api/llm/credentials/test 端点（不需要认证也可调，但建议鉴权）
        @PostMapping("/credentials/test")
        public Result<Map<String,String>> test(@RequestBody TestRequest req) {
            dynamicChatService.testConnection(req.providerKey(), req.apiKey());
            return Result.ok(Map.of("message", "连接成功"));
        }

        // 前端：先 test 通过再 PUT 保存
        await apiFetch('/llm/credentials/test', { method:'POST', body:... })
        await apiFetch('/llm/credentials', { method:'PUT', body:... })
    prevention: |
      凡是涉及外部服务凭据的保存（API Key、Webhook URL、SMTP 配置等），
      必须提供"先测试再保存"的工作流，禁止静默存储未验证的凭据。
      testConnection 失败时的 AppException message 必须是用户可读的中文，
      不得拼接内部异常的 e.getMessage()。
    affected_files:
      - DynamicChatService.testConnection
      - LlmController（POST /credentials/test）
      - frontend/src/app/page.tsx（handleApiKeySubmit）
