services:

  # ─── PostgreSQL 16 + pgvector ──────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: learningos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       learningos
      POSTGRES_USER:     learningos
      POSTGRES_PASSWORD: learningos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learningos"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Redis 7 ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: learningos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
